<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteLakeStudio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">WhiteLakeStudio</div>
        <div class="menu-icon">&#9776;</div>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="gallery.html">GALLERY</a></li>
                <li><a href="workflow.html">WORKFLOW</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <div class="video-carousel">
                <video autoplay muted loop id="video1">
                    <source src="content/video/porsche_911.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <video autoplay muted loop id="video2">
                    <source src="content/video/Video_2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <video autoplay muted loop id="video3">
                    <source src="content/video/Video_3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <video autoplay muted loop id="video4">
                    <source src="content/video/Video_4.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="slogan"><div class="slogan_in">Innovation at the heart of progress.</div>
            <div>Turning dreams into digital masterpieces</div>
            <div>Visualizing tomorrow's possibilities.</div></div>
            <div class="social-icons">
                <a href="#"><img src="content/icons/instagram.png" alt="instagram"></a>
                <a href="#"><img src="content/icons/telegram.png" alt="telegram"></a>
                <a href="#"><img src="content/icons/whatsapp.png" alt="whatsapp"></a>
                <a href="#"><img src="content/icons/youtube.png" alt="youtube"></a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 WhiteLakeStudio. All rights reserved.</p>
    </footer>

    <script>
        const videos = document.querySelectorAll('.video-carousel video');
        let currentVideoIndex = 0;

        function showNextVideo() {
            videos[currentVideoIndex].style.opacity = 0;
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            videos[currentVideoIndex].style.opacity = 1;
        }

        videos[currentVideoIndex].style.opacity = 1;
        setInterval(showNextVideo, 20000);

        
        const menuIcon = document.querySelector('.menu-icon');
        const navMenu = document.querySelector('.nav-menu');

        menuIcon.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
    <script>
        function toggleMenu() {
            const navMenu = document.querySelector('.nav-menu');
            navMenu.classList.toggle('active');
        }
        </script>
</body>
</html>
